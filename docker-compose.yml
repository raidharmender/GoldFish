services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: goldfish
      POSTGRES_PASSWORD: goldfish
      POSTGRES_DB: goldfish
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goldfish -d goldfish"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
